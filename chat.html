<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="リアルタイムチャット画面" />
    <title>チャット - チャットアプリ</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#06C755" />
</head>

<body>
    <div class="page-wrapper">

        <!-- ヘッダー -->
        <header class="app-header">
            <a href="friends.html" class="back-btn" id="backBtn">‹</a>
            <div class="friend-avatar" id="headerAvatar" style="width:36px;height:36px;font-size:1rem;">?</div>
            <h1 id="headerName">チャット</h1>
        </header>

        <!-- メッセージ一覧 -->
        <main class="chat-messages" id="chatMessages">
            <div class="loading-overlay" id="msgLoading">
                <div class="spinner"></div>
                <span>読み込み中...</span>
            </div>
        </main>

        <!-- 入力エリア -->
        <div class="chat-input-area">
            <textarea id="msgInput" class="chat-input" placeholder="メッセージを入力..." rows="1" maxlength="1000"></textarea>
            <button class="send-btn" id="sendBtn" title="送信">
                <svg class="send-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>

        <!-- トースト -->
        <div class="toast" id="toast"></div>
    </div>

    <script type="module" src="js/chat.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(console.warn);
        }
    </script>
</body>

</html>
